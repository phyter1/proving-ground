name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install (dev extras)
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -q

      # The metric and the whole harness are designed to run with no Lean toolchain,
      # so CI needs nothing more than Python. Live Lean verification is exercised on the
      # fleet, not in CI.
