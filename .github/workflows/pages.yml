name: Deploy leaderboard

on:
  push:
    branches: [main]
    paths:
      - "runs/**"
      - "src/proving_ground/leaderboard.py"
      - "src/proving_ground/results.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install
        run: uv pip install --system -e .

      - name: Render leaderboard
        # The leaderboard renders from committed run results — no Lean toolchain needed.
        run: python -m proving_ground.cli leaderboard runs/benchmark-v1-claude.json --out _site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
